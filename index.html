// ═══ UTILITY FUNCTIONS ═══
function cdf(x){const a1=.254829592,a2=-.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429;const s=x<0?-1:1;x=Math.abs(x)/Math.sqrt(2);const t=1/(1+.3275911*x);const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return .5*(1+s*y)}

function detectFormat(text){const h=text.substring(0,2000);if(h.includes("MyHeritage")||h.match(/^RSID,CHROMOSOME/mi))return"myheritage";if(h.includes("23andMe")||h.match(/^#.*23andMe/m))return"23andme";if(h.includes("AncestryDNA")||h.match(/^rsid\tchromosome\tposition\tallele1/mi))return"ancestry";if(h.includes("##fileformat=VCF"))return"vcf";if(h.match(/^rsid\tchromosome\tposition\tgenotype/mi))return"23andme";if(h.match(/^RSID,/mi))return"myheritage";return"auto"}

function parseFile(text){const fmt=detectFormat(text);const results={};const lines=text.split("\n");const Q=s=>s.trim().replace(/^["']+|["']+$/g,"");
for(const line of lines){if(line.startsWith("#")||!line.trim())continue;
if(fmt==="myheritage"||fmt==="auto"){const p=line.includes(",")?line.split(","):line.split("\t");if(p.length>=4){const rs=Q(p[0]).toLowerCase();const gt=Q(p[3]).toUpperCase();if(rs.startsWith("rs")&&gt.length>=2&&gt!=="--"&&gt!=="00"&&gt!=="NN")results[rs]=gt}}
if(fmt==="23andme"||fmt==="auto"){const p=line.split("\t");if(p.length>=4){const rs=Q(p[0]).toLowerCase();const gt=Q(p[3]).toUpperCase();if(rs.startsWith("rs")&&gt.length>=2&&gt!=="--"&&gt!=="00")results[rs]=gt}}
if(fmt==="ancestry"){const p=line.split("\t");if(p.length>=5){const rs=Q(p[0]).toLowerCase();const a1=Q(p[3]).toUpperCase();const a2=Q(p[4]).toUpperCase();if(rs.startsWith("rs")&&a1!=="0")results[rs]=a1+a2}}
if(fmt==="vcf"){const p=line.split("\t");if(p.length>=10){const id=Q(p[2]).toLowerCase();const ref=Q(p[3]).toUpperCase();const alt=Q(p[4]).toUpperCase();const gt=Q(p[9]).split(":")[0];if(id.startsWith("rs")&&gt){const alleles=[ref,...alt.split(",")];const idx=gt.replace("|","/").split("/").map(Number);results[id]=idx.map(i=>alleles[i]||"?").join("")}}}}
return{format:fmt,data:results,total:Object.keys(results).length}}

function matchSNPs(rawData){const matched=[];for(const snp of SNP_DB){const gt=rawData[snp.rs.toLowerCase()];if(gt&&gt!=="--"&&gt!=="00"&&gt!=="NN"){const rc=(gt[0]===snp.risk?1:0)+(gt[1]===snp.risk?1:0);matched.push({...snp,genotype:gt,riskCount:rc,status:rc===2?"homozygous_risk":rc===1?"heterozygous":"normal"})}}return matched}

function calculatePRS(matchedSNPs){const results={};for(const[k,m]of Object.entries(PRS_MODELS)){let score=0,used=0;for(const rs of m.snps){const snp=matchedSNPs.find(s=>s.rs===rs);const db=SNP_DB.find(s=>s.rs===rs);if(snp&&db?.beta){score+=snp.riskCount*db.beta;used++}}if(used>0){const z=(score-m.pop_mean)/m.pop_sd;results[k]={name:m.name,score:score.toFixed(2),z:z.toFixed(2),percentile:Math.round(cdf(z)*100),snpsUsed:used,snpsTotal:m.snps.length,category:m.category}}}return results}

function resolveAPOE(snps){const e1=snps.find(s=>s.rs==="rs429358"),e2=snps.find(s=>s.rs==="rs7412");if(!e1||!e2)return null;const g1=e1.genotype,g2=e2.genotype;let a=[];for(let i=0;i<2;i++){const x=g1[i],y=g2[i];if(x==="T"&&y==="T")a.push("ε3");else if(x==="T"&&y==="C")a.push("ε2");else if(x==="C"&&y==="T")a.push("ε4");else a.push("?")}a.sort();return a.join("/")}

function checkCarriers(s1,s2){const cSNPs=SNP_DB.filter(s=>s.cat==="CARRIER");const risks=[];for(const snp of cSNPs){const m1=s1.find(s=>s.rs===snp.rs),m2=s2.find(s=>s.rs===snp.rs);if(m1&&m2){const c1=m1.riskCount>=1,c2=m2.riskCount>=1;if(c1&&c2)risks.push({gene:snp.gene,desc:snp.desc,risk:"Оба — носители. Риск для ребёнка: 25%",severity:"HIGH"});else if(c1||c2)risks.push({gene:snp.gene,desc:snp.desc,risk:"Один — носитель. Больные дети: 0%",severity:"LOW"})}}return risks}

const saveKey=k=>{setApiKey(k);try{localStorage.setItem("ga_api_key",k)}catch(e){}};

const bs=(c)=>({padding:"8px 16px",background:`${c}22`,border:`1px solid ${c}55`,borderRadius:8,color:"#e2e8f0",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"});
const cb=(a,c)=>({padding:"6px 14px",background:a?`${c}33`:"rgba(30,41,59,.5)",border:`1px solid ${a?c:"#334155"}`,borderRadius:20,color:a?"#e2e8f0":"#94a3b8",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:a?600:400,whiteSpace:"nowrap"});

return(
<div>
{/* HEADER */}
<div style={{background:"linear-gradient(90deg,rgba(99,102,241,.15),rgba(168,85,247,.1),transparent)",borderBottom:"1px solid rgba(99,102,241,.2)",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
<div style={{display:"flex",alignItems:"center",gap:12}}>
<span style={{fontSize:28}}>🧬</span>
<div><h1 style={{margin:0,fontSize:18,fontWeight:700,color:"#c4b5fd",letterSpacing:"-.5px"}}>GENOME ANALYZER</h1>
<span style={{fontSize:10,color:"#64748b",letterSpacing:"2px"}}>MyHeritage · 23andMe · Ancestry · VCF · LOCAL</span></div>
</div>
{(step==="results"||step==="report")&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
<button onClick={()=>setPartner(!partner)} style={bs("#8b5cf6")}>👫 Партнёр</button>
<button onClick={()=>setShowKey(!showKey)} style={bs("#334155")}>🔑 API</button>
<button onClick={genAI} disabled={aiLoading} style={bs("#6366f1")}>{aiLoading?"⏳...":"🤖 AI-отчёт"}</button>
<button onClick={()=>exportPDF(m1,prs,apoe,pr1,aiReport,carriers)} style={bs("#22c55e")}>📄 PDF</button>
<button onClick={()=>{setStep("upload");setFile1(null);setM1([]);setPrs(null);setApoe(null);setAiReport("");setFile2(null);setM2([]);setCarriers(null);setActiveCat("ALL")}} style={bs("#ef4444")}>✕</button>
</div>}
</div>

{/* API KEY INPUT */}
{showKey&&<div style={{margin:"12px 24px",padding:16,background:"rgba(30,41,59,.8)",border:"1px solid #334155",borderRadius:10}} className="fade-in">
<label style={{fontSize:12,color:"#94a3b8",display:"block",marginBottom:8}}>Anthropic API Key (для AI-отчёта, хранится только в localStorage вашего браузера):</label>
<div style={{display:"flex",gap:8}}>
<input type="password" value={apiKey} onChange={e=>saveKey(e.target.value)} placeholder="sk-ant-..." style={{flex:1,padding:"8px 12px",background:"#0f0f1a",border:"1px solid #334155",borderRadius:6,color:"#e2e8f0",fontFamily:"inherit",fontSize:12}} />
<button onClick={()=>setShowKey(false)} style={bs("#22c55e")}>✓</button>
</div>
<p style={{fontSize:10,color:"#64748b",marginTop:6}}>Без ключа всё работает кроме AI-отчёта. Ключ никуда не отправляется кроме api.anthropic.com.</p>
</div>}

{error&&<div style={{margin:"12px 24px",padding:"12px 16px",background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,color:"#fca5a5",fontSize:13}}>⚠️ {error}</div>}

{/* UPLOAD */}
{step==="upload"&&<div style={{maxWidth:700,margin:"60px auto",padding:"0 24px"}} className="fade-in">
<div onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer?.files?.[0])}} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onClick={()=>fr.current?.click()}
style={{border:`2px dashed ${drag?"#6366f1":"#334155"}`,borderRadius:16,padding:"60px 40px",textAlign:"center",cursor:"pointer",background:drag?"rgba(99,102,241,.08)":"rgba(30,41,59,.5)",transition:"all .3s"}}>
<div style={{fontSize:56,marginBottom:16}}>🧬</div>
<h2 style={{margin:"0 0 8px",color:"#c4b5fd",fontSize:20}}>Перетащите файл генотипирования</h2>
<p style={{color:"#94a3b8",fontSize:13,margin:"0 0 20px"}}>MyHeritage (.csv) · 23andMe (.txt) · Ancestry (.txt) · WGS (.vcf)</p>
<div style={{display:"inline-block",padding:"10px 28px",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:8,fontWeight:600,fontSize:13,color:"#fff"}}>Выбрать файл</div>
<input ref={fr} type="file" accept=".csv,.txt,.vcf,.tsv" style={{display:"none"}} onChange={e=>handleFile(e.target.files?.[0])} />
</div>
<div style={{marginTop:40,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
{[{i:"🔒",t:"100% локально",d:"Парсинг в браузере. Файл никуда не уходит."},{i:"📊",t:`${SNP_DB.length} SNP`,d:"Мета-анализы, GWAS Catalog, PharmGKB."},{i:"📈",t:"PRS",d:"Процентили для 5 заболеваний."},{i:"🔑",t:"AI-отчёт (опц.)",d:"Claude API — отправляется только выжимка, не геном."}].map((f,i)=>
<div key={i} style={{background:"rgba(30,41,59,.6)",border:"1px solid #1e293b",borderRadius:10,padding:16}}>
<span style={{fontSize:24}}>{f.i}</span><h4 style={{margin:"8px 0 4px",color:"#c4b5fd",fontSize:13}}>{f.t}</h4>
<p style={{margin:0,color:"#94a3b8",fontSize:11,lineHeight:1.5}}>{f.d}</p></div>)}
</div>
</div>}

{/* RESULTS */}
{(step==="results"||step==="report")&&m1.length>0&&<div style={{padding:"20px 24px",maxWidth:1200,margin:"0 auto"}} className="fade-in">
{/* Stats */}
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:20}}>
{[["Формат",pr1?.format?.toUpperCase(),"#6366f1"],["SNP в файле",pr1?.total?.toLocaleString(),"#8b5cf6"],["Совпадений",`${m1.length}/${SNP_DB.length}`,"#a855f7"],["Гомозигот",m1.filter(s=>s.status==="homozygous_risk").length,"#ef4444"],["Гетерозигот",m1.filter(s=>s.status==="heterozygous").length,"#f59e0b"],...(apoe?[["APOE",apoe,apoe.includes("ε4")?"#ef4444":"#22c55e"]]:[])].map(([l,v,c],i)=>
<div key={i} style={{background:"rgba(30,41,59,.6)",border:`1px solid ${c}33`,borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
<div style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:"1px",marginBottom:4}}>{l}</div>
<div style={{fontSize:20,fontWeight:800,color:c}}>{v}</div></div>)}
</div>

{/* PRS */}
{prs&&Object.keys(prs).length>0&&<div style={{background:"rgba(30,41,59,.6)",border:"1px solid #1e293b",borderRadius:12,padding:20,marginBottom:20}}>
<h3 style={{margin:"0 0 16px",color:"#c4b5fd",fontSize:15}}>📊 Полигенные риски (PRS) — процентили</h3>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
{Object.entries(prs).map(([k,v])=>{const c=v.percentile>80?"#ef4444":v.percentile>60?"#f97316":v.percentile>40?"#c4b5fd":"#22c55e";return(
<div key={k} style={{background:"rgba(15,15,26,.5)",borderRadius:10,padding:14,border:`1px solid ${v.percentile>80?"rgba(239,68,68,.3)":"rgba(99,102,241,.2)"}`}}>
<div style={{fontSize:12,color:"#94a3b8",marginBottom:6}}>{v.name}</div>
<div style={{fontSize:28,fontWeight:800,color:c}}>{v.percentile}<span style={{fontSize:14,color:"#64748b"}}>%</span></div>
<div style={{height:6,background:"#1e293b",borderRadius:3,marginTop:8,overflow:"hidden"}}><div style={{width:`${v.percentile}%`,height:"100%",background:v.percentile>80?"#ef4444":v.percentile>60?"#f97316":"#6366f1",borderRadius:3}}/></div>
<div style={{fontSize:10,color:"#64748b",marginTop:4}}>z={v.z} · {v.snpsUsed}/{v.snpsTotal} SNP</div>
</div>)})}
</div></div>}

{/* Partner */}
{partner&&<div style={{background:"rgba(139,92,246,.1)",border:"1px solid rgba(139,92,246,.3)",borderRadius:12,padding:20,marginBottom:20}}>
<h3 style={{margin:"0 0 12px",color:"#c4b5fd"}}>👫 Партнёрский скрининг</h3>
{!file2?<div onClick={()=>fr2.current?.click()} style={{border:"2px dashed #4c1d95",borderRadius:10,padding:24,textAlign:"center",cursor:"pointer",background:"rgba(76,29,149,.1)"}}>
<p style={{margin:0,color:"#a78bfa"}}>Загрузите файл партнёра</p>
<input ref={fr2} type="file" accept=".csv,.txt,.vcf,.tsv" style={{display:"none"}} onChange={e=>handleFile(e.target.files?.[0],true)} /></div>
:<div><p style={{color:"#a78bfa",fontSize:12}}>✅ {file2.name} ({pr2?.total?.toLocaleString()} SNP)</p>
{carriers&&<div>{carriers.filter(r=>r.severity==="HIGH").length===0?<p style={{color:"#22c55e",fontWeight:600}}>✅ Критических совпадений нет</p>
:carriers.filter(r=>r.severity==="HIGH").map((r,i)=><div key={i} style={{background:"rgba(239,68,68,.15)",border:"1px solid rgba(239,68,68,.3)",borderRadius:8,padding:12,marginTop:8}}>
<strong style={{color:"#fca5a5"}}>⚠️ {r.gene}</strong>: {r.risk}<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{r.desc}</div></div>)}
{carriers.filter(r=>r.severity==="LOW").length>0&&<details style={{marginTop:10}}><summary style={{cursor:"pointer",color:"#94a3b8",fontSize:12}}>Все ({carriers.length})</summary>
{carriers.map((r,i)=><div key={i} style={{padding:"6px 0",borderBottom:"1px solid #1e293b",fontSize:11}}><strong>{r.gene}</strong>: {r.risk}</div>)}</details>}
</div>}</div>}
</div>}

{/* AI Report */}
{step==="report"&&aiReport&&<div style={{background:"rgba(30,41,59,.8)",border:"1px solid rgba(99,102,241,.3)",borderRadius:12,padding:24,marginBottom:20,maxHeight:600,overflowY:"auto"}}>
<h3 style={{margin:"0 0 16px",color:"#c4b5fd"}}>🤖 AI-анализ</h3>
<div style={{fontSize:13,lineHeight:1.8,color:"#cbd5e1"}}>
{aiReport.split("\n").map((l,i)=>{
if(l.startsWith("## "))return<h3 key={i} style={{color:"#a78bfa",fontSize:15,margin:"20px 0 8px"}}>{l.replace("## ","")}</h3>;
if(l.startsWith("### "))return<h4 key={i} style={{color:"#c4b5fd",fontSize:13,margin:"14px 0 6px"}}>{l.replace("### ","")}</h4>;
if(l.startsWith("- ")||l.startsWith("* "))return<div key={i} style={{paddingLeft:16,margin:"2px 0"}}>• {l.replace(/^[-*]\s/,"").replace(/\*\*(.*?)\*\*/g,(m,p)=>`«${p}»`)}</div>;
return<p key={i} style={{margin:"4px 0"}}>{l}</p>})}
</div></div>}

{/* Category Filter */}
<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:16,flexWrap:"wrap"}}>
<button onClick={()=>setActiveCat("ALL")} style={cb(activeCat==="ALL","#6366f1")}>Все ({m1.length})</button>
{Object.entries(CAT_LABELS).map(([cat,info])=>{const c=stats[cat]?.t||0;if(!c)return null;return<button key={cat} onClick={()=>setActiveCat(cat)} style={cb(activeCat===cat,info.color)}>{info.icon} {info.name} ({c})</button>})}
</div>

{/* SNP Table */}
<div style={{background:"rgba(30,41,59,.5)",border:"1px solid #1e293b",borderRadius:12,overflow:"hidden"}}>
<div style={{display:"grid",gridTemplateColumns:"100px 90px 70px 100px 1fr",gap:0,padding:"10px 14px",background:"rgba(99,102,241,.1)",fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"1px"}}>
<span>RS ID</span><span>Ген</span><span>Генотип</span><span>Статус</span><span>Описание</span></div>
<div style={{maxHeight:500,overflowY:"auto"}}>
{filtered.sort((a,b)=>b.riskCount-a.riskCount).map((snp,i)=>{const st=STATUS_LABELS[snp.status];return(
<div key={i} style={{display:"grid",gridTemplateColumns:"100px 90px 70px 100px 1fr",gap:0,padding:"8px 14px",borderBottom:"1px solid rgba(30,41,59,.8)",background:i%2?"rgba(15,15,26,.3)":"transparent",fontSize:12,alignItems:"start"}}>
<span style={{color:"#818cf8",fontWeight:600}}>{snp.rs}</span>
<span style={{color:"#a5b4fc"}}>{snp.gene}</span>
<span style={{fontWeight:700,color:"#e2e8f0",fontFamily:"monospace"}}>{snp.genotype}</span>
<span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,color:st.color,background:st.bg+"22",border:`1px solid ${st.color}33`}}>{st.label}</span>
<div><div style={{color:"#cbd5e1",fontSize:11}}>{snp.desc}</div><div style={{color:"#64748b",fontSize:10,marginTop:2}}>{snp.trait}</div></div>
</div>)})}
</div></div>

{/* Disclaimer */}
<div style={{marginTop:24,padding:16,background:"rgba(250,204,21,.08)",border:"1px solid rgba(250,204,21,.2)",borderRadius:10,fontSize:11,color:"#fbbf24",lineHeight:1.6}}>
⚠️ <strong>Дисклеймер:</strong> Информационный инструмент, НЕ диагноз. PRS для европейской популяции. Обратитесь к генетику.
</div>
</div>}
</div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
